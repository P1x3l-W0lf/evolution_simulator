<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Evolution</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Evolution</h1>
    <label for="speedDial">Adjust the Simulation Speed</label>
    <p>↓↓↓</p>
    <input type="range" id="speedDial" min="1" max="10" value="1" step="1">
    <div id="container">
        <div id="stat-table">
            <div id="header">
                <h3>~ STATS ~</h3>
            </div>
            <div id="table">
                <div class="row">
                    <h4>Simulation Speed:</h4>
                    <h4 class="stat" id="speedDisplay">1</h4>
                </div>
                <div class="row">
                    <h4>Creature Count:</h4>
                    <h4 class="stat" id="creatureCount">0</h4>
                </div>
                <div class="row">
                    <h4>Male/Female Ratio:</h4>
                    <h4 class="stat" id="genderRatio">0/0</h4>
                </div>
                <div class="row">
                    <h4>Average Hunger Capacity:</h4>
                    <h4 class="stat" id="avgHunger">0</h4>
                </div>
                <div class="row">
                    <h4>Average Thirst Capacity:</h4>
                    <h4 class="stat" id="avgThirst">0</h4>
                </div>
            </div>
        </div>
        <div id="grid"></div>
    </div>
</body>
</html>
